version: 1
planes:
  architecture: { enabled: true }

languages:
  typescript:
    roots: ["src"]
    tool: { name: dependency-cruiser, minVersion: "16.0.0" }
  php:
    roots: ["app"]
    tool: { name: deptrac, minVersion: "2.0.0" }

modules:
  granularity: directory

policy:
  layers:
    order: [domain, application, infrastructure]
  # Promote the cross-module duplication advisory from Tier B to blocking for this
  # repo (M0.6). A promoted advisory now gates like a Tier A rule.
  promote:
    - rule: arch.duplication
      to: block

gate:
  failClosed: true
  local: { planes: [architecture] }
  ci: { planes: [architecture] }
