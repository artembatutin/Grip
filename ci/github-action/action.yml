# Grip GitHub Action (plan/03 M0.9). Drop into a workflow to gate PRs: it builds
# grip, provisions the analyzers, runs `grip gate --ci`, uploads SARIF for inline
# annotations, and fails the check on a block (exit 1 or 2).
#
# Example:
#   - uses: artembatutin/grip/ci/github-action@v0
#     with:
#       working-directory: .
name: "Grip architecture gate"
description: "Fail the build if an AI-agent change moves the system's shape without consent."
inputs:
  working-directory:
    description: "Repo subdirectory containing .grip.yaml"
    required: false
    default: "."
  analysis-dir:
    description: "Optional dir of recorded analyzer reports (offline/testing). If unset, real analyzers run."
    required: false
    default: ""
  grip-version:
    description: "Pinned Grip release version (for example v0.2.0)"
    required: false
    default: "v0.2.0"
runs:
  using: "composite"
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.26.x"
    - name: Set up Node (dependency-cruiser)
      uses: actions/setup-node@v4
      with:
        node-version: "20"
    - name: Set up PHP (deptrac)
      uses: shivammathur/setup-php@v2
      with:
        php-version: "8.3"
    - name: Provision analyzers
      shell: bash
      run: |
        if [ -z "${{ inputs.analysis-dir }}" ]; then
          npm i -g dependency-cruiser@18.1.0 ts-morph@24.0.0
          composer global require deptrac/deptrac:^4.0 nikic/php-parser:^5.0
          echo "$(composer global config bin-dir --absolute)" >> "$GITHUB_PATH"
        fi
    - name: Install Grip release
      shell: bash
      run: |
        GOBIN="$RUNNER_TEMP/grip-bin" go install "github.com/artembatutin/grip/cmd/grip@${{ inputs.grip-version }}"
        echo "$RUNNER_TEMP/grip-bin" >> "$GITHUB_PATH"
    - name: Run grip gate
      id: gate
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set +e
        set -- --ci --sarif
        if [ -n "${{ inputs.analysis-dir }}" ]; then set -- "$@" --analysis-dir "${{ inputs.analysis-dir }}"; fi
        grip gate "$@" > grip.sarif
        code=$?
        echo "exit=$code" >> "$GITHUB_OUTPUT"
        # Human summary to the job log (re-run without --sarif).
        if [ -n "${{ inputs.analysis-dir }}" ]; then
          grip gate --ci --analysis-dir "${{ inputs.analysis-dir }}" || true
        else
          grip gate --ci || true
        fi
    - name: Upload SARIF
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.working-directory }}/grip.sarif
    - name: Fail on block
      shell: bash
      run: |
        code="${{ steps.gate.outputs.exit }}"
        if [ "$code" != "0" ]; then
          echo "::error::grip blocked this change (exit $code)."
          exit "$code"
        fi
