# Grip GitLab CI template (plan/03 M0.9). Include it and extend .grip-gate:
#
#   include:
#     - remote: 'https://raw.githubusercontent.com/artembatutin/grip/main/ci/gitlab/.gitlab-ci.yml'
#   architecture-gate:
#     extends: .grip-gate
#
# The job blocks the pipeline on a hard violation (exit 1) or a fail-closed
# condition (exit 2), and publishes a Code Quality / SARIF report artifact so
# blocks show inline on the MR.

.grip-gate:
  image: golang:1.26
  variables:
    GRIP_VERSION: "main"
    GRIP_WORKDIR: "."
    # Set GRIP_ANALYSIS_DIR to run offline against recorded analyzer reports.
    GRIP_ANALYSIS_DIR: ""
  before_script:
    - apt-get update -qq && apt-get install -y -qq nodejs npm php-cli git >/dev/null
    - if [ -z "$GRIP_ANALYSIS_DIR" ]; then npm i -g dependency-cruiser ts-morph || true; fi
    - go install "github.com/artembatutin/grip/cmd/grip@${GRIP_VERSION}"
  script:
    - cd "$GRIP_WORKDIR"
    - |
      FLAGS="--ci --sarif"
      if [ -n "$GRIP_ANALYSIS_DIR" ]; then FLAGS="$FLAGS --analysis-dir $GRIP_ANALYSIS_DIR"; fi
      set +e
      grip gate $FLAGS > gl-grip.sarif
      code=$?
      set -e
      grip gate --ci ${GRIP_ANALYSIS_DIR:+--analysis-dir $GRIP_ANALYSIS_DIR} || true
      exit $code
  allow_failure: false
  artifacts:
    when: always
    reports:
      sast: gl-grip.sarif
    paths:
      - gl-grip.sarif
