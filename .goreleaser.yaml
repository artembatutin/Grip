version: 2

project_name: grip

before:
  hooks:
    - go test ./ci/helpers ./internal/derive ./internal/cli

builds:
  - id: grip
    main: ./cmd/grip
    binary: grip
    env: [CGO_ENABLED=0]
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/artembatutin/grip/internal/cli.Version={{ .Version }}
    flags: [-trimpath]

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
